<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mental Health Chatbot</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: "Poppins", sans-serif;
            background: #575757;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            flex-direction: column;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 15px;
        }

        .title {
            font-size: 24px;
            font-weight: 600;
        }

        .crisis-text {
            font-size: 14px;
            color: #ff5c5c;
            font-weight: 500;
        }

        .chat-container {
            width: 500px;
            background: #1E1E1E;
            border-radius: 12px;
            box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .chat-header {
            background: #4A90E2;
            color: white;
            padding: 15px;
            text-align: center;
            font-size: 18px;
            font-weight: bold;
        }

        .chat-box {
            height: 450px;
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }

        .chat-box::-webkit-scrollbar {
            display: none;
        }

        .message-container {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .message {
            max-width: 75%;
            padding: 12px;
            border-radius: 12px;
            font-size: 14px;
            opacity: 0;
            transform: translateY(5px);
            animation: fadeIn 0.3s ease-in-out forwards;
        }

        .user-container {
            justify-content: flex-end;
        }

        .user {
            background: #4A90E2;
            color: white;
            align-self: flex-end;
        }

        .bot-container {
            justify-content: flex-start;
        }

        .bot {
            background: #2E2E2E;
            color: #E0E0E0;
            align-self: flex-start;
        }

        .avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
        }

        .user-avatar {
            order: 2;
        }

        .bot-avatar {
            order: -1;
        }

        @keyframes fadeIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .chat-input {
            display: flex;
            padding: 12px;
            border-top: 1px solid #444;
            background: #1E1E1E;
        }

        .chat-input input {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 5px;
            background: #2E2E2E;
            color: white;
            outline: none;
            font-family: "Poppins", sans-serif;
        }

        .chat-input button {
            background: #4A90E2;
            color: white;
            border: none;
            padding: 10px;
            margin-left: 5px;
            cursor: pointer;
            border-radius: 5px;
            transition: 0.2s;
            font-family: "Poppins", sans-serif;
        }

        .chat-input button:hover {
            background: #357ABD;
        }

        .footer {
            font-size: 12px;
            color: #aaaaaa;
            text-align: center;
            margin-top: 10px;
            width: 500px;
        }
    </style>
</head>

<body>
    <div class="header">
        <div class="title">Mental Health Chatbot</div>
        <div class="crisis-text">In crisis? Call <strong>988</strong> for immediate help</div>
    </div>

    <div class="chat-container">
        <div class="chat-header">Chat with Me</div>
        <div class="chat-box" id="chat-box"></div>
        <div class="chat-input">
            <input type="text" id="user-input" placeholder="Type a message..." autofocus />
            <button onclick="sendMessage()">Send</button>
        </div>
    </div>

    <div class="footer">
        This is an AI assistant and not a substitute for professional mental health care. If you're in crisis, please call <strong>988</strong> or seek immediate professional help.  
        <br><br>
        Made with ❤️ by <strong>[Your Name]</strong>
    </div>

    <script>
        function appendMessage(text, className, isUser) {
            let chatBox = document.getElementById("chat-box");
            let messageContainer = document.createElement("div");
            messageContainer.className = "message-container " + (isUser ? "user-container" : "bot-container");

            let avatar = document.createElement("img");
            avatar.className = "avatar " + (isUser ? "user-avatar" : "bot-avatar");
            avatar.src = isUser ? "https://cdn-icons-png.flaticon.com/512/848/848006.png" 
                                : "https://cdn-icons-png.flaticon.com/512/4712/4712035.png";

            let messageDiv = document.createElement("div");
            messageDiv.className = "message " + className;
            messageDiv.textContent = text;

            messageContainer.appendChild(avatar);
            messageContainer.appendChild(messageDiv);
            chatBox.appendChild(messageContainer);

            smoothScrollToBottom();
        }

        function sendMessage() {
            let inputField = document.getElementById("user-input");
            let userMessage = inputField.value.trim();

            if (userMessage === "") return;

            appendMessage(userMessage, "user", true);
            inputField.value = "";

            fetch('http://localhost:8080/api/chat?message=' + encodeURIComponent(userMessage))
                .then(response => response.json())
                .then(data => {
                    setTimeout(() => appendMessage(data.botResponse, "bot", false), 500);
                })
                .catch(error => {
                    appendMessage("Sorry, I couldn't connect to the server.", "bot", false);
                });
        }

        function smoothScrollToBottom() {
            let chatBox = document.getElementById("chat-box");
            setTimeout(() => {
                chatBox.scrollTo({
                    top: chatBox.scrollHeight,
                    behavior: "smooth"
                });
            }, 100);
        }

        document.getElementById("user-input").addEventListener("keypress", function (event) {
            if (event.key === "Enter") {
                event.preventDefault();
                sendMessage();
            }
        });
    </script>
</body>
</html>
